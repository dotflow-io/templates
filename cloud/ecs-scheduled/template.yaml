AWSTemplateFormatVersion: "2010-09-09"
Description: "{{PROJECT_NAME}} — scheduled dotflow pipeline on AWS ECS Fargate"

Resources:
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: {{PROJECT_NAME}}-cluster

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: {{PROJECT_NAME}}
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: "256"
      Memory: "512"
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: {{PROJECT_NAME}}
          Image: {{AWS_ACCOUNT_ID}}.dkr.ecr.{{AWS_REGION}}.amazonaws.com/{{PROJECT_NAME}}:latest
          Essential: true
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/{{PROJECT_NAME}}
              awslogs-region: {{AWS_REGION}}
              awslogs-stream-prefix: ecs

  ScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: {{PROJECT_NAME}}-schedule
      Description: "Scheduled trigger for {{PROJECT_NAME}}"
      ScheduleExpression: "{{SCHEDULE_EXPRESSION}}"
      State: ENABLED
      Targets:
        - Id: ecs-target
          Arn: !GetAtt Cluster.Arn
          RoleArn: !GetAtt EventsRole.Arn
          EcsParameters:
            TaskDefinitionArn: !Ref TaskDefinition
            TaskCount: 1
            LaunchType: FARGATE
            NetworkConfiguration:
              AwsVpcConfiguration:
                AssignPublicIp: ENABLED
                Subnets:
                  - !Ref SubnetId
                SecurityGroups:
                  - !Ref SecurityGroup

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/{{PROJECT_NAME}}
      RetentionInDays: 14

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Security group for {{PROJECT_NAME}} Fargate tasks"
      VpcId: !Ref VpcId

  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  EventsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: run-ecs-task
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ecs:RunTask
                Resource: !Ref TaskDefinition
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !GetAtt ExecutionRole.Arn
                  - !GetAtt TaskRole.Arn

Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet for Fargate tasks
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC for the security group

Outputs:
  ClusterArn:
    Value: !GetAtt Cluster.Arn
  ScheduleRule:
    Value: "{{SCHEDULE_EXPRESSION}}"
