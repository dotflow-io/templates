name: Run {{PROJECT_NAME}}

on:
  schedule:
    - cron: "{{SCHEDULE_EXPRESSION}}"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -e .

      - run: python -m {{MODULE_NAME}}.workflow
