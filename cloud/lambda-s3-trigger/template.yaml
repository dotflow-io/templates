AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: "{{PROJECT_NAME}} — S3-triggered dotflow pipeline on AWS Lambda"

Resources:
  WorkflowFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      FunctionName: {{PROJECT_NAME}}
      Timeout: 900
      MemorySize: 512
      Events:
        S3Event:
          Type: S3
          Properties:
            Bucket: !Ref SourceBucket
            Events:
              - s3:ObjectCreated:*
    Metadata:
      DockerTag: latest
      DockerContext: .
      Dockerfile: Dockerfile

  SourceBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: {{PROJECT_NAME}}-source

Outputs:
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt WorkflowFunction.Arn
  BucketName:
    Description: Source S3 bucket
    Value: !Ref SourceBucket
